<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😏 خلص كلام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(ellipse at center, #1a1025 0%, #0a0a0f 70%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .p3-box {
            max-width: 380px;
            width: 100%;
            text-align: center;
            animation: scaleIn 0.6s ease;
        }

        .p3-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .p3-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.3rem;
            line-height: 1.6;
        }

        .p3-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        .p3-display {
            width: 160px;
            height: 60px;
            margin: 0 auto 1.5rem;
            background: #1a1a24;
            border: 2px solid #333;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            font-family: var(--font-main);
            color: var(--text-primary);
            letter-spacing: 8px;
            direction: ltr;
            transition: border-color 0.3s;
        }

        .p3-display.filled {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px var(--shadow-gold);
        }

        .p3-numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.6rem;
            max-width: 250px;
            margin: 0 auto 1rem;
        }

        .p3-num {
            height: 55px;
            border: none;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .p3-num:active {
            transform: scale(0.92);
            background: rgba(212, 168, 83, 0.15);
        }

        .p3-num.clear {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            font-size: 1rem;
        }

        .p3-done {
            width: 100%;
            max-width: 250px;
            padding: 0.9rem;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent-gold), #f0d080);
            color: #0a0a0f;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px var(--shadow-gold);
        }

        .p3-done:active {
            transform: scale(0.95);
        }

        .p3-done:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: none;
        }

        .p3-error {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 14px;
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            animation: scaleIn 0.4s ease;
        }

        .p3-error p {
            color: #e74c3c;
            font-size: 0.95rem;
            font-weight: 700;
            line-height: 1.6;
        }

        .p3-error .error-icon {
            font-size: 2rem;
            margin-bottom: 0.3rem;
        }

        .p3-block-timer {
            margin-top: 0.8rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .hidden { display: none !important; }

        .p3-stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .p3-star {
            position: absolute;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: starTwinkle ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="p3-stars" id="p3Stars"></div>

    <div class="p3-box">
        <div class="p3-icon">🤨</div>
        <h1 class="p3-title">كلمت كام وحدة في حياتك؟</h1>
        <p class="p3-sub">و انا هرجعك للصفحة 😏</p>

        <div class="p3-display" id="display"></div>

        <div class="p3-numpad">
            <button class="p3-num" data-n="1">1</button>
            <button class="p3-num" data-n="2">2</button>
            <button class="p3-num" data-n="3">3</button>
            <button class="p3-num" data-n="4">4</button>
            <button class="p3-num" data-n="5">5</button>
            <button class="p3-num" data-n="6">6</button>
            <button class="p3-num" data-n="7">7</button>
            <button class="p3-num" data-n="8">8</button>
            <button class="p3-num" data-n="9">9</button>
            <button class="p3-num" data-n=""></button>
            <button class="p3-num" data-n="0">0</button>
            <button class="p3-num clear" id="clearBtn">مسح</button>
        </div>

        <button class="p3-done" id="doneBtn">تم ✅</button>

        <div id="errorBox" class="p3-error hidden">
            <div class="error-icon">🚫</div>
            <p>غلط! انا عارف انت كلمت كام بنت 🫵😂</p>
            <p style="margin-top:0.3rem;font-size:0.85rem;color:var(--text-secondary);">خد حظر دقيقة 🤫</p>
            <div class="p3-block-timer" id="blockTimer">انتظر 60 ثانية...</div>
        </div>
    </div>

    <script>
        // ===== AUTH CHECK =====
        if (!sessionStorage.getItem('auth')) {
            window.location.href = 'index.html';
        }

        // ===== STARS =====
        const starsContainer = document.getElementById('p3Stars');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'p3-star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.width = s.style.height = (1 + Math.random() * 2) + 'px';
            s.style.animationDuration = (2 + Math.random() * 3) + 's';
            s.style.animationDelay = (Math.random() * 4) + 's';
            starsContainer.appendChild(s);
        }

        // ===== NUMPAD =====
        const display = document.getElementById('display');
        const doneBtn = document.getElementById('doneBtn');
        const errorBox = document.getElementById('errorBox');
        const clearBtn = document.getElementById('clearBtn');
        const blockTimerEl = document.getElementById('blockTimer');
        let value = '';
        let blocked = false;

        function updateDisplay() {
            const displayText = value.padEnd(3, '_').split('').join(' ');
            display.textContent = displayText;
            if (value.length === 3) {
                display.classList.add('filled');
            } else {
                display.classList.remove('filled');
            }
            doneBtn.disabled = value.length !== 3;
        }

        document.querySelectorAll('.p3-num[data-n]').forEach(btn => {
            btn.addEventListener('click', () => {
                if (blocked) return;
                const n = btn.dataset.n;
                if (value.length < 3) {
                    value += n;
                    updateDisplay();
                }
            });
        });

        clearBtn.addEventListener('click', () => {
            if (blocked) return;
            value = value.slice(0, -1);
            updateDisplay();
        });

        doneBtn.addEventListener('click', () => {
            if (blocked || value.length !== 3) return;

            if (value === '111') {
                // Correct - go back
                doneBtn.textContent = 'تمام 🎉';
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } else {
                // Wrong - block for 1 minute
                blocked = true;
                errorBox.classList.remove('hidden');
                doneBtn.disabled = true;

                let seconds = 60;
                blockTimerEl.textContent = `انتظر ${seconds} ثانية...`;
                const interval = setInterval(() => {
                    seconds--;
                    blockTimerEl.textContent = `انتظر ${seconds} ثانية...`;
                    if (seconds <= 0) {
                        clearInterval(interval);
                        blocked = false;
                        errorBox.classList.add('hidden');
                        doneBtn.disabled = false;
                        value = '';
                        updateDisplay();
                        blockTimerEl.textContent = '';
                    }
                }, 1000);
            }
        });

        updateDisplay();
    </script>
</body>
</html>
