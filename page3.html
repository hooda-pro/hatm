<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😅 ايه ده</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a1025 0%, #0a0a0f 70%);
        }

        .p3-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .p3-card {
            position: relative;
            z-index: 1;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: scaleIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .p3-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }

        .p3-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-rose), var(--accent-gold));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s ease infinite;
            margin: 1rem 0;
        }

        .p3-sub {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .p3-btn {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: var(--font-main);
            border: 1px solid var(--border-glow);
            border-radius: 50px;
            background: linear-gradient(135deg, var(--accent-gold), #f0d080);
            color: #0a0a0f;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px var(--shadow-gold);
        }

        .p3-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 0 50px var(--shadow-gold);
        }

        .p3-btn:active {
            transform: scale(0.92);
        }

        .p3-stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .p3-star {
            position: absolute;
            background: var(--accent-gold);
            border-radius: 50%;
            animation: starTwinkle ease-in-out infinite;
        }

        @keyframes starTwinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }

        .p3-float-emoji {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            animation: p3EmojiFloat 5s ease-in-out infinite;
        }

        @keyframes p3EmojiFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            25% { transform: translateY(-25px) rotate(8deg); opacity: 0.7; }
            50% { transform: translateY(-10px) rotate(-5deg); opacity: 0.4; }
            75% { transform: translateY(-30px) rotate(5deg); opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="p3-stars" id="p3Stars"></div>

    <div class="p3-wrap">
        <div class="p3-card">
            <div class="p3-icon">😅</div>
            <h1 class="p3-title">هو انت لسه شفت حاجه؟</h1>
            <p class="p3-sub">
                استني عليا ياض 😂<br>
                لسه فيه حاجات كتير 😏
            </p>
            <button class="p3-btn" onclick="window.location.href='index.html'">⬅️ رجع للصفحة الأولى</button>
        </div>
    </div>

    <script>
        // ===== AUTH CHECK =====
        if (!sessionStorage.getItem('auth')) {
            window.location.href = 'index.html';
        }

        // Stars
        const starsContainer = document.getElementById('p3Stars');
        for (let i = 0; i < 50; i++) {
            const s = document.createElement('div');
            s.className = 'p3-star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.width = s.style.height = (1 + Math.random() * 3) + 'px';
            s.style.animationDuration = (2 + Math.random() * 3) + 's';
            s.style.animationDelay = (Math.random() * 4) + 's';
            starsContainer.appendChild(s);
        }

        // Floating emojis
        const emojis = ['😅', '😂', '🤣', '😏', '🙃', '🤨', '😤'];
        for (let i = 0; i < 6; i++) {
            const e = document.createElement('div');
            e.className = 'p3-float-emoji';
            e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + '%';
            e.style.top = Math.random() * 100 + '%';
            e.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
            e.style.animationDelay = (Math.random() * 4) + 's';
            e.style.animationDuration = (4 + Math.random() * 3) + 's';
            document.body.appendChild(e);
        }

        // Confetti
        const canvas = document.createElement('canvas');
        canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9998';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        let W, H, pieces = [];

        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        class P {
            constructor() {
                this.x = Math.random() * W;
                this.y = Math.random() * H - H;
                this.w = 3 + Math.random() * 5;
                this.h = 2 + Math.random() * 4;
                this.c = ['#d4a853','#c08497','#5fa8a0','#f0d080','#e74c3c','#2ecc71','#9b59b6'][Math.floor(Math.random()*7)];
                this.s = 1 + Math.random() * 2;
                this.wind = (Math.random() - 0.5) * 0.5;
                this.r = Math.random() * 360;
                this.rs = (Math.random() - 0.5) * 4;
            }
            u() {
                this.y += this.s; this.x += this.wind; this.r += this.rs;
                if (this.y > H + 20) { this.y = -20; this.x = Math.random() * W; }
            }
            d() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.r * Math.PI / 180);
                ctx.fillStyle = this.c;
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.restore();
            }
        }

        for (let i = 0; i < 60; i++) pieces.push(new P());

        function loop() {
            ctx.clearRect(0, 0, W, H);
            pieces.forEach(p => { p.u(); p.d(); });
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
